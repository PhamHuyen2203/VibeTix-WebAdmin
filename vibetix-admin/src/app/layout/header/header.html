<header class="header">
  <!-- Hamburger -->
  <button class="btn-icon header-btn" aria-label="Toggle sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- Search -->
  <div class="header-search">
    <div class="form-control-icon">
      <span class="icon-left">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
      <input
        type="search"
        class="form-control input-search"
        placeholder="Search events, users, orders..."
        aria-label="Global search"
        id="global-search"
      />
    </div>
    <kbd class="search-shortcut">Ctrl K</kbd>
  </div>

  <!-- Right actions -->
  <div class="header-actions">
    <!-- Help -->
    <button class="btn-icon header-btn" aria-label="Help" title="Help">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"></path>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
    </button>

    <!-- Notifications -->
    <button class="btn-icon header-btn notif-btn" aria-label="Notifications" title="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 01-3.46 0"></path>
      </svg>
      @if (notifCount() > 0) {
        <span class="notif-badge">{{ notifCount() }}</span>
      }
    </button>

    <!-- Admin Profile Dropdown -->
    <div class="dropdown">
      <button class="admin-profile-btn" (click)="toggleDropdown()" id="admin-menu-btn" aria-haspopup="true" [attr.aria-expanded]="dropdownOpen()">
        <div class="avatar avatar-md avatar-placeholder">
          {{ getInitials(adminProfile()?.displayName) }}
        </div>
        <div class="admin-info">
          <span class="admin-name">{{ adminProfile()?.displayName ?? 'Admin' }}</span>
          <span class="admin-role">{{ adminProfile()?.role === 'superAdmin' ? 'Super Admin' : 'Admin' }}</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      @if (dropdownOpen()) {
        <div class="dropdown-menu" (mouseleave)="closeDropdown()">
          <div class="dropdown-item" style="cursor:default; opacity:0.7;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Profile
          </div>
          <div class="dropdown-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
            Settings
          </div>
          <div class="dropdown-divider"></div>
          <div class="dropdown-item danger" (click)="logout()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Sign out
          </div>
        </div>
      }
    </div>
  </div>
</header>
