<div class="login-page">
  <!-- Left Panel: Brand Story -->
  <div class="login-left">
    <img src="brand/left-login.png" alt="VibeTix Illustration" class="left-login-img" />
  </div>

  <!-- Right Panel: Login Form -->
  <div class="login-right">
    <div class="login-form-wrap">
      <!-- Header -->
      <div class="form-header">
        <img src="brand/logo-vibetix.png" alt="VibeTix" class="form-logo" />
        <h2 class="form-title">Welcome back</h2>
        <p class="form-subtitle">Sign in to VibeTix WebAdmin</p>
      </div>

      <!-- Error Alert -->
      @if (errorMessage()) {
        <div class="alert-error" role="alert">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          {{ errorMessage() }}
        </div>
      }

      <!-- Form -->
      <form class="login-form" (ngSubmit)="onSubmit()" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <div class="form-control-icon">
            <span class="icon-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </span>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="admin@vibetix.com"
              [value]="email()"
              (input)="email.set($any($event.target).value)"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-control-icon">
            <span class="icon-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
            </span>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              class="form-control has-right-icon"
              placeholder="••••••••••••"
              [value]="password()"
              (input)="password.set($any($event.target).value)"
              autocomplete="current-password"
              required
            />
            <button type="button" class="icon-right" (click)="togglePassword()" aria-label="Toggle password visibility">
              @if (showPassword()) {
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              } @else {
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              }
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="form-row">
          <label class="form-check">
            <input
              type="checkbox"
              id="rememberMe"
              [checked]="rememberMe()"
              (change)="rememberMe.set($any($event.target).checked)"
            />
            <span class="form-check-label">Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          id="login-submit-btn"
          class="btn btn-primary btn-block btn-lg login-btn"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="spinner"></span>
            Signing in...
          } @else {
            Sign in
          }
        </button>
      </form>

      <!-- Divider -->
      <div class="form-divider">
        <span>or</span>
      </div>

      <!-- Backup Code -->
      <button class="btn btn-ghost btn-block backup-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Use backup code
      </button>

      <!-- Security Note -->
      <div class="security-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <div>
          <p class="security-title">Secure &amp; trusted</p>
          <p class="security-desc">All admin access is protected with 256-bit encryption and secure authentication.</p>
        </div>
      </div>
    </div>
  </div>
</div>
